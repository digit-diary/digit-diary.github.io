name: Concierge Supabase keep-alive

# Tiene "sveglio" il progetto Supabase del concierge (il free tier va in pausa
# dopo ~7 giorni di inattività). Una richiesta leggera al contatore ogni giorno
# basta. Nessun dato personale, nessun segreto: usa solo la chiave anonima pubblica.

on:
  schedule:
    - cron: '17 5 * * *'   # ogni giorno alle 05:17 UTC
  workflow_dispatch:        # avvio manuale dal tab Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping contatore concierge
        run: |
          MESE=$(date +%Y-%m)
          URL="https://hzkzhjubeexctltfgsml.supabase.co/rest/v1/rpc/concierge_get_uso"
          KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6a3poanViZWV4Y3RsdGZnc21sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMTM5OTQsImV4cCI6MjA5Njg4OTk5NH0._GJMMAAdNG2UTtn0nvsWzxy6vPfR72HoV-1rZTizZy8"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$URL" \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY" \
            -H "Content-Type: application/json" \
            -d "{\"p_mese\":\"$MESE\"}")
          echo "Supabase keep-alive HTTP $CODE"
          test "$CODE" = "200"
