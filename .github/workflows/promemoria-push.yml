name: Promemoria e Compleanni Push

on:
  schedule:
    # Ogni ora, 24/7
    - cron: '0 * * * *'
  workflow_dispatch: # Permette esecuzione manuale

jobs:
  check-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Check promemoria
        run: |
          RESPONSE=$(curl -s -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/get_due_promemoria" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')

          echo "Promemoria: $RESPONSE"

          if [ "$RESPONSE" != "[]" ] && [ -n "$RESPONSE" ] && [ "$RESPONSE" != "null" ]; then
            echo "$RESPONSE" | jq -c '.[]' 2>/dev/null | while read -r PM; do
              TITOLO=$(echo "$PM" | jq -r '.titolo')
              ASSEGNATO=$(echo "$PM" | jq -r '.assegnato_a')
              DESCRIZIONE=$(echo "$PM" | jq -r '.descrizione // "" | .[0:100]')

              if [ "$ASSEGNATO" = "tutti" ]; then
                TARGETS='["tutti"]'
              else
                TARGETS="[\"$ASSEGNATO\"]"
              fi

              curl -s -X POST \
                "${{ secrets.SUPABASE_URL }}/functions/v1/send-push" \
                -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
                -H "Content-Type: application/json" \
                -H "x-push-secret: ${{ secrets.PUSH_SECRET }}" \
                -d "{\"action\":\"send\",\"destinatari\":$TARGETS,\"titolo\":\"Promemoria: $TITOLO\",\"corpo\":\"$DESCRIZIONE\",\"tipo\":\"promemoria\"}"

              echo "Push promemoria: $TITOLO -> $ASSEGNATO"
            done
          fi

      - name: Check compleanni (solo alle 08:00)
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" != "06" ] && [ "$HOUR" != "07" ] && [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ]; then
            echo "Non sono le 07-08:00 CET, skip compleanni"
            exit 0
          fi

          RESPONSE=$(curl -s -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/rpc/get_today_birthdays" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}')

          echo "Compleanni: $RESPONSE"

          if [ "$RESPONSE" != "[]" ] && [ -n "$RESPONSE" ] && [ "$RESPONSE" != "null" ]; then
            # Compleanni per reparto slots
            NOMI_SLOTS=$(echo "$RESPONSE" | jq -r '[.[] | select(.reparto_dip == "slots" or .reparto_dip == "tutti")] | .[].nome' 2>/dev/null | paste -sd ', ')
            if [ -n "$NOMI_SLOTS" ]; then
              curl -s -X POST \
                "${{ secrets.SUPABASE_URL }}/functions/v1/send-push" \
                -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
                -H "Content-Type: application/json" \
                -H "x-push-secret: ${{ secrets.PUSH_SECRET }}" \
                -d "{\"action\":\"send\",\"destinatari\":[\"tutti\"],\"titolo\":\"Compleanno oggi\",\"corpo\":\"$NOMI_SLOTS\",\"tipo\":\"promemoria\",\"reparto_dip\":\"slots\"}"
              echo "Push compleanni slots: $NOMI_SLOTS"
            fi
            # Compleanni per reparto tavoli
            NOMI_TAVOLI=$(echo "$RESPONSE" | jq -r '[.[] | select(.reparto_dip == "tavoli" or .reparto_dip == "tutti")] | .[].nome' 2>/dev/null | paste -sd ', ')
            if [ -n "$NOMI_TAVOLI" ]; then
              curl -s -X POST \
                "${{ secrets.SUPABASE_URL }}/functions/v1/send-push" \
                -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
                -H "Content-Type: application/json" \
                -H "x-push-secret: ${{ secrets.PUSH_SECRET }}" \
                -d "{\"action\":\"send\",\"destinatari\":[\"tutti\"],\"titolo\":\"Compleanno oggi\",\"corpo\":\"$NOMI_TAVOLI\",\"tipo\":\"promemoria\",\"reparto_dip\":\"tavoli\"}"
              echo "Push compleanni tavoli: $NOMI_TAVOLI"
            fi
          fi

          echo "Completato"
