<div id="status" style="text-align:center;font-size:1.2rem;color:#333">Generazione manuale in corso...</div>
<script>
window.addEventListener('load', function(){
const {jsPDF} = window.jspdf;
const doc = new jsPDF('portrait','mm','a4');
const pw = doc.internal.pageSize.getWidth();
const ph = doc.internal.pageSize.getHeight();
const mx = 18, mr = 18;
const tw = pw - mx - mr;
let y = 0;
let pageNum = 1;
const tocEntries = [];

function addFooter(){
  doc.setFontSize(7);doc.setFont('helvetica','normal');doc.setTextColor(150);
  doc.text('Diario Collaboratori — Manuale Utente — Casino Lugano SA',mx,ph-8);
  doc.text('Pag. '+pageNum,pw-mr,ph-8,{align:'right'});
  doc.setDrawColor(200);doc.line(mx,ph-12,pw-mr,ph-12);
}

function newPage(){
  addFooter();
  doc.addPage();
  pageNum++;
  y = 20;
}

function checkPage(need){
  if(y + need > ph - 20){newPage();return true}
  return false;
}

function title(text, level){
  if(level === 1){
    checkPage(40);
    doc.setFillColor(26,18,8);
    doc.rect(mx,y,tw,12,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(250,247,242);
    doc.text(text,mx+4,y+8.5);
    y += 16;
    tocEntries.push({text, page: pageNum, level: 1});
  } else if(level === 2){
    checkPage(16);
    doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(26,18,8);
    doc.text(text,mx,y);
    doc.setDrawColor(192,57,43);doc.setLineWidth(0.5);
    doc.line(mx,y+1.5,mx+doc.getTextWidth(text),y+1.5);
    y += 7;
    tocEntries.push({text, page: pageNum, level: 2});
  } else {
    checkPage(12);
    doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(139,105,20);
    doc.text(text,mx,y);
    y += 5.5;
  }
  doc.setTextColor(0);
}

function para(text, indent){
  const x = mx + (indent||0);
  const maxW = tw - (indent||0);
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(40);
  const lines = doc.splitTextToSize(text, maxW);
  lines.forEach(function(line){
    checkPage(4.5);
    doc.text(line, x, y);
    y += 4;
  });
  y += 2;
}

function bullet(text, indent){
  const x = mx + (indent||4);
  const maxW = tw - (indent||4) - 4;
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(40);
  checkPage(4.5);
  doc.setFillColor(26,18,8);
  doc.circle(x, y-1, 0.8, 'F');
  const lines = doc.splitTextToSize(text, maxW);
  lines.forEach(function(line, i){
    checkPage(4.5);
    doc.text(line, x+4, y);
    y += 4;
  });
  y += 1;
}

function tip(text){
  checkPage(14);
  doc.setFillColor(255,248,230);
  const lines = doc.splitTextToSize(text, tw-12);
  const h = lines.length * 4 + 6;
  doc.roundedRect(mx, y-2, tw, h, 1.5, 1.5, 'F');
  doc.setDrawColor(184,134,11);doc.setLineWidth(0.3);
  doc.roundedRect(mx, y-2, tw, h, 1.5, 1.5, 'S');
  doc.setFont('helvetica','italic');doc.setFontSize(8.5);doc.setTextColor(139,105,20);
  lines.forEach(function(line){
    doc.text(line, mx+6, y+1);
    y += 4;
  });
  y += 4;
}

function spacer(h){ y += (h||4); }

// ===== COPERTINA =====
y = 50;
doc.setFont('helvetica','bold');doc.setFontSize(28);doc.setTextColor(26,18,8);
doc.text('MANUALE UTENTE', pw/2, y, {align:'center'});
y += 14;
doc.setFontSize(16);doc.setFont('helvetica','normal');doc.setTextColor(100);
doc.text('Diario Collaboratori', pw/2, y, {align:'center'});
y += 10;
doc.setFontSize(12);doc.setTextColor(139,105,20);doc.setFont('helvetica','bold');
doc.text('Casino Lugano SA', pw/2, y, {align:'center'});
y += 20;
doc.setDrawColor(192,57,43);doc.setLineWidth(1);
doc.line(pw/2-40, y, pw/2+40, y);
y += 16;
doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(100);
doc.text('Versione: Marzo 2026', pw/2, y, {align:'center'});
y += 6;
doc.text('https://digit-diary.github.io', pw/2, y, {align:'center'});
y += 30;
doc.setFontSize(9);doc.setTextColor(120);
doc.text('Questo manuale descrive tutte le funzionalita dell\'applicazione', pw/2, y, {align:'center'});
y += 5;
doc.text('Diario Collaboratori, dalla registrazione eventi alla generazione', pw/2, y, {align:'center'});
y += 5;
doc.text('di moduli disciplinari, statistiche e gestione del personale.', pw/2, y, {align:'center'});

addFooter();

// ===== INDICE (placeholder - compilato alla fine) =====
newPage();
const tocPageStart = pageNum;
doc.setFont('helvetica','bold');doc.setFontSize(16);doc.setTextColor(26,18,8);
doc.text('INDICE', pw/2, y, {align:'center'});
y += 12;
// Salvo posizione per riempire dopo
const tocY = y;
// Lascio 2 pagine per l'indice
addFooter();newPage();addFooter();newPage();

// ===== 1. ACCESSO =====
title('1. ACCESSO ALL\'APPLICAZIONE', 1);
spacer(2);
para('L\'applicazione e accessibile all\'indirizzo https://digit-diary.github.io da qualsiasi browser (Chrome, Safari, Firefox, Edge) su computer, tablet o smartphone.');

para('All\'apertura viene mostrata la schermata di login. Sono disponibili due modalita di accesso:');
bullet('Admin: selezionare "Admin (password master)" dal menu a tendina e inserire la password master. L\'admin ha accesso completo a tutte le funzionalita.');

tip('Al primo accesso come operatore, il sistema chiede di impostare una nuova password. La password temporanea viene fornita dall\'admin.');

title('Come faccio a cambiare la mia password?', 3);
para('Andare in Impostazioni e cliccare "Cambia la mia password" nella sezione Sicurezza.');
title('Ho dimenticato la password, cosa faccio?', 3);
para('Cliccare "Password dimenticata?" nella schermata di login e inserire il codice di recupero. Se non si dispone del codice, contattare l\'admin.');
title('Posso usare l\'app offline?', 3);
para('No, l\'app richiede una connessione internet per accedere al database. Tuttavia i PDF generati possono essere salvati localmente.');
title('I dati sono al sicuro?', 3);
para('Si. Le password sono hashate (SHA-256), le credenziali del database sono offuscate, e le operazioni sensibili passano per funzioni server-side protette.');
title('Quanto costa l\'app?', 3);
para('L\'app e completamente gratuita. Il hosting (GitHub Pages) e il database (Supabase piano free) non hanno costi. L\'AI (Groq) ha un piano gratuito sufficiente (~14.400 richieste al giorno).');
title('Le firme digitali sono valide legalmente?', 3);
para('Le firme su canvas servono come evidenza interna del consenso. Per valore legale pieno, si consiglia la firma cartacea o un sistema di firma elettronica qualificata.');
title('Come faccio a nascondere una funzione a un operatore?', 3);
para('Come admin, andare in Impostazioni > Visibilita pagine e funzioni. Selezionare "Operatori selezionati" e spuntare solo gli operatori autorizzati, oppure "Nascosto" per nascondere a tutti.');
