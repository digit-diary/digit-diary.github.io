<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" width="1000" height="720" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <rect x="0" y="0" width="1000" height="720" fill="#ffffff"/>
  <!-- corridoi (bande chiare) -->
  <g fill="#f3f3f7">
    <rect x="300" y="20" width="80" height="680"/>
    <rect x="640" y="20" width="60" height="680"/>
    <rect x="20" y="200" width="960" height="60"/>
    <rect x="20" y="440" width="960" height="40"/>
  </g>
  <!-- stanze -->
  <g fill="#e9e9ee" stroke="#c4c4cf" stroke-width="2">
    <rect x="40"  y="40"  width="300" height="180" rx="6"/>
    <rect x="380" y="40"  width="260" height="160" rx="6"/>
    <rect x="680" y="40"  width="280" height="180" rx="6"/>
    <rect x="40"  y="260" width="260" height="180" rx="6"/>
    <rect x="380" y="240" width="260" height="200" rx="6"/>
    <rect x="700" y="260" width="260" height="160" rx="6"/>
    <rect x="40"  y="480" width="260" height="180" rx="6"/>
    <rect x="380" y="480" width="260" height="180" rx="6"/>
    <rect x="680" y="460" width="150" height="200" rx="6"/>
    <rect x="850" y="460" width="110" height="200" rx="6"/>
  </g>
  <!-- etichette -->
  <g fill="#6b6b78" font-size="17" font-weight="600" text-anchor="middle" letter-spacing="1">
    <text x="190" y="135">SALA A</text>
    <text x="510" y="125">SALA EVENTI</text>
    <text x="820" y="135">RISTORANTE</text>
    <text x="170" y="355">BAR</text>
    <text x="510" y="345">SALA B</text>
    <text x="830" y="345">NEGOZIO</text>
    <text x="170" y="575">CAFFÈ</text>
    <text x="510" y="575">SALA C</text>
    <text x="755" y="565">CASSA</text>
    <text x="905" y="555">ASCEN-</text>
    <text x="905" y="578">SORI</text>
  </g>
  <!-- ingressi -->
  <g fill="#9a9aa6" font-size="14" font-weight="600">
    <text x="14" y="350">ENTRATA</text>
    <path d="M70 360 h22 m0 0 l-6 -5 m6 5 l-6 5" stroke="#9a9aa6" stroke-width="2" fill="none"/>
    <text x="14" y="470">ENTRATA</text>
    <path d="M70 480 h22 m0 0 l-6 -5 m6 5 l-6 5" stroke="#9a9aa6" stroke-width="2" fill="none"/>
  </g>
