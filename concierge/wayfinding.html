<!doctype html><html lang="it"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wayfinding Pro · Concierge (white-label)</title>
<style>
  :root{--oro:#e8d5a3;--bg1:#241f33;--bg2:#0a0a0f}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(ellipse at 50% 25%,var(--bg1),var(--bg2) 75%);color:#fff;
       font-family:-apple-system,Segoe UI,Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 36px}
  h1{font-weight:300;letter-spacing:1px;font-size:19px;margin:2px 0;color:var(--oro)}
  .sub{opacity:.5;font-size:12px;margin-bottom:10px;text-align:center;max-width:780px}
  .bar{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;align-items:center;margin-bottom:8px;max-width:920px}
  .bar input[type=text]{background:rgba(255,255,255,.06);border:1px solid rgba(232,213,163,.4);color:#fff;padding:8px 12px;border-radius:20px;font-size:14px;min-width:150px;text-align:center}
  select.lang{background:rgba(255,255,255,.06);border:1px solid rgba(232,213,163,.4);color:#fff;padding:8px 10px;border-radius:20px;font-size:14px}
  button.b{display:inline-flex;align-items:center;gap:6px;background:rgba(232,213,163,.08);border:1.3px solid rgba(232,213,163,.5);color:#fff;padding:8px 13px;border-radius:22px;font-size:13px;cursor:pointer;transition:.18s}
  button.b:hover{background:rgba(232,213,163,.2);border-color:var(--oro)}
  button.b.on{background:var(--oro);color:#1a1622;border-color:var(--oro);font-weight:600}
  button.b svg{width:16px;height:16px}
  .seg{display:inline-flex;gap:4px;background:rgba(0,0,0,.25);padding:4px;border-radius:24px;border:1px solid rgba(255,255,255,.08)}
  .seg button{display:inline-flex;align-items:center;gap:6px;border:none;background:transparent;color:#fff;padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px}
  .seg button.on{background:var(--oro);color:#1a1622;font-weight:600}
  .seg button svg{width:16px;height:16px}
  .tools{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;align-items:center;margin-bottom:8px;max-width:920px}
  .tools button{font-size:12.5px;padding:7px 11px}
  .badge{font-size:11px;opacity:.5;align-self:center}
  /* ricerca + chip (ospite) */
  .askwrap{display:flex;flex-direction:column;align-items:center;gap:7px;margin-bottom:9px;width:min(94vw,760px)}
  .askbar{display:flex;gap:8px;width:100%;align-items:center}
  .askbar input{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(232,213,163,.4);color:#fff;padding:11px 16px;border-radius:26px;font-size:15px}
  .mic{flex:none;width:44px;height:44px;border-radius:50%;border:1.3px solid rgba(232,213,163,.5);background:rgba(232,213,163,.08);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .mic.rec{background:#c0392b;border-color:#c0392b;animation:micp 1s infinite}
  .mic.acton{background:var(--oro);color:#1a1622;border-color:var(--oro)}
  .floors{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:9px}
  .floors button{font-size:13px;padding:7px 14px;border-radius:18px;border:1px solid rgba(232,213,163,.35);background:rgba(255,255,255,.05);color:#cdbf9e;cursor:pointer}
  .floors button.on{background:var(--oro);color:#1a1622;border-color:var(--oro);font-weight:600}
  .floors button.addf{color:var(--oro)}
  @keyframes micp{50%{box-shadow:0 0 0 6px rgba(192,57,43,.3)}}
  .mic svg{width:20px;height:20px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  .chips button{font-size:12.5px;padding:6px 12px;border-radius:16px;border:1px solid rgba(232,213,163,.3);background:transparent;color:#cdbf9e;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .chips button.on{background:var(--oro);color:#1a1622;border-color:var(--oro);font-weight:600}
  .chips svg{width:14px;height:14px}
  .dest{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:840px;margin-bottom:10px}
  .dest button{display:inline-flex;align-items:center;gap:8px;background:rgba(232,213,163,.08);border:1.3px solid rgba(232,213,163,.5);color:#fff;padding:9px 15px;border-radius:26px;font-size:14.5px;cursor:pointer;transition:.2s}
  .dest button svg{width:18px;height:18px}
  .dest button:hover,.dest button.on{background:rgba(232,213,163,.22);border-color:var(--oro)}
  .mapwrap{position:relative;width:min(94vw,860px);aspect-ratio:10/7;background:#15131d;border:1px solid rgba(232,213,163,.25);border-radius:16px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,.5)}
  svg.map{width:100%;height:100%;display:block;touch-action:none}
  .zone{fill:url(#zoneGrad);stroke:rgba(232,213,163,.22);stroke-width:1.5;filter:drop-shadow(0 6px 16px rgba(0,0,0,.45))}
  .zoneLbl{fill:#9a8fb5;font-size:14px;text-anchor:middle;font-weight:500;letter-spacing:2px}
  .dimPrev{fill:#fff;font-size:13px;font-weight:700;paint-order:stroke;stroke:#1a1622;stroke-width:3px}
  #bgImg{filter:saturate(.55) brightness(.5) contrast(1.05)}
  .edge{stroke:#3d6fa5;stroke-width:3;stroke-linecap:round;opacity:.7}
  .wall{stroke:#6b6480;stroke-width:9;stroke-linecap:round;stroke-linejoin:round;cursor:pointer}
  .doorGap{stroke:#15131d;stroke-width:12;stroke-linecap:butt}
  .door{stroke:#e8d5a3;stroke-width:2.5;fill:none;cursor:pointer}
  #linePrev.wall{stroke:#8a83a0}
  #linePrev.edge{stroke:#4aa3ff;stroke-width:5}
  #zonePrev{stroke-dasharray:6 5}
  .node{fill:#4aa3ff;stroke:#fff;stroke-width:1.5;cursor:pointer}
  .node.sel{fill:#fff;stroke:#4aa3ff;stroke-width:3}
  .corrHint{stroke:#2c2638;stroke-width:14;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .route{stroke:var(--oro);stroke-width:6;fill:none;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 7px rgba(232,213,163,.9))}
  .route-flow{stroke:#fff7e0;stroke-width:2.6;fill:none;stroke-linecap:round;stroke-dasharray:2 17;animation:flow 1s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-19}}
  .chev{stroke:#fff;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:.9}
  .dot{fill:#fff;filter:drop-shadow(0 0 9px var(--oro))}
  .pin{cursor:pointer}
  .pin .pinBody{fill:var(--oro);stroke:#1a1622;stroke-width:1;filter:drop-shadow(0 3px 7px rgba(0,0,0,.55))}
  .pinIcon{stroke:#1a1622;stroke-width:2.3;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .pin.active .pinBody{fill:#fff;animation:pinPulse 1.2s ease-in-out infinite}
  @keyframes pinPulse{0%,100%{filter:drop-shadow(0 0 0 rgba(232,213,163,.7))}50%{filter:drop-shadow(0 0 14px rgba(232,213,163,1))}}
  .pin.dim{opacity:.28}
  .pinTxt{fill:#fff;font-size:12.5px;text-anchor:middle;font-weight:600;paint-order:stroke;stroke:#1a1622;stroke-width:3px}
  .here{fill:#3ad07a;stroke:#fff;stroke-width:2}
  .here-ring{fill:none;stroke:#3ad07a;stroke-width:2;opacity:.7;animation:hereP 1.7s ease-out infinite}
  @keyframes hereP{0%{r:11;opacity:.7}100%{r:30;opacity:0}}
  .here-tag{fill:#fff;font-size:11.5px;text-anchor:middle;font-weight:700;paint-order:stroke;stroke:#1a1622;stroke-width:3px}
  /* logo + zoom + card sopra la mappa */
  .logo{position:absolute;top:12px;left:14px;color:var(--oro);font-size:15px;font-weight:500;letter-spacing:.5px;text-shadow:0 2px 8px rgba(0,0,0,.7);pointer-events:none}
  .wfbanner{position:absolute;top:12px;left:50%;transform:translateX(-50%);max-width:84%;background:rgba(20,16,30,.93);border:1px solid var(--oro);color:#fff;padding:9px 14px;border-radius:22px;display:none;align-items:center;gap:10px;font-size:14px;z-index:6;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .wfbanner.on{display:flex}
  .wfbanner svg{width:18px;height:18px;stroke:var(--oro);flex:none}
  .wfbanner button{background:var(--oro);color:#1a1622;border:none;border-radius:16px;padding:6px 12px;font-weight:600;cursor:pointer;flex:none}
  @keyframes floorIn{from{opacity:0;filter:blur(7px)}to{opacity:1;filter:none}}
  .zoomctl{position:absolute;right:12px;bottom:12px;display:flex;flex-direction:column;gap:6px}
  .zoomctl button{width:38px;height:38px;border-radius:10px;border:1px solid rgba(232,213,163,.4);background:rgba(20,16,30,.8);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .card{position:absolute;left:12px;bottom:12px;max-width:300px;background:rgba(20,16,30,.92);border:1px solid rgba(232,213,163,.4);border-radius:14px;padding:12px 14px;display:none;align-items:center;gap:12px;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .card.on{display:flex}
  .card .ci{width:46px;height:46px;border-radius:50%;background:var(--oro);color:#1a1622;display:flex;align-items:center;justify-content:center;flex:none}
  .card .ci svg{width:24px;height:24px;stroke:#1a1622;stroke-width:2.2;fill:none}
  .card .cn{font-size:16px;font-weight:600}
  .card .cs{font-size:12.5px;opacity:.65}
  .card .cd{font-size:13px;color:var(--oro);margin-top:3px;display:flex;align-items:center;gap:5px}
  .card .cd svg{width:14px;height:14px}
  .note{opacity:.5;font-size:11.5px;margin-top:11px;text-align:center;max-width:780px;line-height:1.5}
  .hidden{display:none!important}
  #pinCorner{position:fixed;top:0;left:0;width:64px;height:64px;z-index:40}
  .ov{position:fixed;inset:0;background:rgba(8,6,14,.7);display:none;align-items:center;justify-content:center;z-index:20}
  .ov.on{display:flex}
  .cardE{background:#1b1726;border:1px solid rgba(232,213,163,.35);border-radius:16px;padding:18px;width:min(92vw,380px)}
  .cardE h3{margin:0 0 12px;color:var(--oro);font-weight:500;font-size:16px}
  .cardE input{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(232,213,163,.4);color:#fff;padding:10px 12px;border-radius:10px;font-size:15px;margin-bottom:12px}
  .catTabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
  .catTabs button{font-size:11.5px;padding:5px 9px;border-radius:14px;border:1px solid rgba(232,213,163,.3);background:transparent;color:#cdbf9e;cursor:pointer}
  .catTabs button.on{background:var(--oro);color:#1a1622;border-color:var(--oro);font-weight:600}
  .icoGrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:14px}
  .icoGrid button{background:rgba(255,255,255,.05);border:1.4px solid transparent;border-radius:10px;padding:8px 0;cursor:pointer;color:#cdbf9e;display:flex;justify-content:center}
  .icoGrid button.on{border-color:var(--oro);background:rgba(232,213,163,.16);color:var(--oro)}
  .icoGrid svg{width:20px;height:20px}
  .cardRow{display:flex;gap:8px;justify-content:space-between}
  /* adattamento a qualsiasi schermo */
  @media (min-width:1500px){ h1{font-size:26px} .dest button{font-size:19px;padding:12px 20px} .dest button svg{width:22px;height:22px} button.b{font-size:15px} .askbar input{font-size:19px;padding:14px 20px} .chips button{font-size:15px} .card .cn{font-size:19px} }
  @media (max-width:560px){ h1{font-size:17px} .sub{font-size:11px} .dest button{font-size:13px;padding:8px 12px} .askbar input{font-size:14px} .card{max-width:78vw} .bar{gap:5px} }
</style></head>
<body>
  <h1 id="ttl">Wayfinding</h1>
  <div class="sub" id="sub">Prototipo white-label · personalizzabile per ogni azienda</div>

  <div id="pinCorner" title="Admin"></div>
  <div class="bar">
    <span class="seg adminOnly">
      <button id="mGuest" class="on" data-ic="eye" onclick="setMode('guest')"></button>
      <button id="mAdmin" data-ic="gear" onclick="setMode('admin')"></button>
    </span>
    <select class="lang adminOnly" id="lang" onchange="setLang(this.value)" title="Nel Concierge la lingua arriva dalla home">
      <option value="it">IT</option><option value="en">EN</option><option value="de">DE</option><option value="fr">FR</option><option value="es">ES</option><option value="ru">RU</option><option value="zh">ZH</option><option value="ar">AR</option>
    </select>
    <input type="text" id="company" class="adminOnly" oninput="onCompany()">
    <label class="b adminOnly" id="lblImport" for="fileMap" data-ic="image"></label>
    <input type="file" id="fileMap" accept="image/*,application/pdf" class="hidden" onchange="importMap(event)">
    <button class="b adminOnly" id="btnBg" onclick="toggleBg()"></button>
    <button class="b adminOnly" id="btnDemo" data-ic="sparkle" onclick="loadCasino()"></button>
    <button class="b adminOnly" id="btnPin" data-ic="key" data-lbl="PIN" onclick="changePin()"></button>
    <button class="b adminOnly" id="btnReset" data-ic="reset" onclick="resetAll()"></button>
  </div>

  <!-- Strumenti admin -->
  <div class="tools hidden" id="adminTools">
    <span class="badge">SEMPLICE:</span>
    <button class="b on" data-tool="dest" data-ic="pin"  onclick="setTool('dest')"></button>
    <button class="b"    data-tool="here" data-ic="here" onclick="setTool('here')"></button>
    <span class="badge">DISEGNA MAPPA:</span>
    <button class="b"    data-tool="zone" data-ic="room" onclick="setTool('zone')"></button>
    <button class="b"    data-tool="wall" data-ic="wall" onclick="setTool('wall')"></button>
    <button class="b"    data-tool="door" data-ic="door" onclick="setTool('door')"></button>
    <button class="b"    data-tool="corr" data-ic="corr" onclick="setTool('corr')"></button>
    <span class="badge">CORRIDOI (avanz.):</span>
    <button class="b"    data-tool="node" data-ic="dot"  onclick="setTool('node')"></button>
    <button class="b"    data-tool="link" data-ic="link" onclick="setTool('link')"></button>
    <button class="b"    data-ic="sparkle" onclick="autoLink()" id="btnAuto"></button>
    <button class="b"    data-tool="del"  data-ic="trash" onclick="setTool('del')"></button>
    <button class="b" id="btnUndo" data-ic="undo" data-lbl="Annulla" onclick="undo()"></button>
    <button class="b" id="btnRedo" data-ic="redo" data-lbl="Ripeti" onclick="redo()"></button>
    <button class="b" id="btnExport" data-ic="download" data-lbl="Esporta PDF" onclick="exportMap()"></button>
    <span class="badge">AI:</span>
    <button class="b" id="btnOcr" data-ic="sparkle" data-lbl="Leggi piantina" onclick="ocrRead()"></button>
    <button class="b" id="btnTr" data-ic="sparkle" data-lbl="Traduci nomi" onclick="translateAll()"></button>
  </div>
  <div class="tools hidden" id="adminHint"><span class="badge" id="hintTxt" style="opacity:.8;color:var(--oro)"></span></div>

  <!-- Ricerca + voce + filtri (ospite) -->
  <div class="askwrap" id="askwrap">
    <div class="askbar">
      <input type="text" id="ask" oninput="onSearch()" onkeydown="if(event.key==='Enter')askGo()">
      <button class="mic" id="mic" onclick="micToggle()" title="Voce"></button>
      <button class="mic" id="acc" onclick="toggleAcc()" title="Percorso accessibile"></button>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="floors hidden" id="floors"></div>
  <div class="dest" id="destBtns"></div>

  <div class="mapwrap" id="mapwrap">
    <div class="logo" id="logo"></div>
    <div class="wfbanner" id="banner"></div>
    <svg id="svg" class="map" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid slice">
      <defs>
        <radialGradient id="zoneGrad" cx="50%" cy="32%" r="80%"><stop offset="0%" stop-color="#2c2543"/><stop offset="100%" stop-color="#191525"/></radialGradient>
        <radialGradient id="vign" cx="50%" cy="28%" r="85%"><stop offset="0%" stop-color="#241f33"/><stop offset="100%" stop-color="#0b0910"/></radialGradient>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#fff" stroke-opacity=".03" stroke-width="1"/></pattern>
      </defs>
      <rect x="0" y="0" width="1000" height="700" fill="url(#vign)"/>
      <rect x="0" y="0" width="1000" height="700" fill="url(#grid)"/>
      <g id="viewport">
        <image id="bgImg" class="hidden" x="0" y="0" width="1000" height="700" preserveAspectRatio="xMidYMid slice"/>
        <rect id="bgTint" class="hidden" x="0" y="0" width="1000" height="700" fill="#15102a" opacity=".45"/>
        <g id="gDemo"></g>
        <g id="gWalls"></g>
        <g id="gDoors"></g>
        <rect id="zonePrev" class="zone" opacity=".45" style="display:none"/>
        <line id="linePrev" opacity=".7" style="display:none"/>
        <text id="dimPrev" class="dimPrev" style="display:none"></text>
        <g id="gEdges"></g>
        <g id="gRouteHint"></g>
        <path class="route" id="route" d=""/>
        <path class="route-flow" id="routeFlow" d=""/>
        <g id="gArrows"></g>
        <circle class="dot hidden" id="dot" r="7"/>
        <g id="gNodes"></g>
        <g id="gDests"></g>
        <g id="gHere"></g>
      </g>
    </svg>
    <div class="card" id="card">
      <div class="ci" id="cardIc"></div>
      <div><div class="cn" id="cardName"></div><div class="cs" id="cardSub"></div><div class="cd" id="cardDist"></div></div>
    </div>
  </div>

  <div class="note" id="footNote"></div>

  <!-- Editor destinazione -->
  <div class="ov" id="ov"><div class="cardE">
    <h3 id="ovTitle">Destinazione</h3>
    <input type="text" id="ovName" placeholder="Nome">
    <div class="catTabs" id="ovCats"></div>
    <div class="icoGrid" id="ovIcons"></div>
    <div class="cardRow">
      <button class="b" data-ic="trash" data-lbl="Elimina" onclick="ovDelete()"></button>
      <span style="flex:1"></span>
      <button class="b" data-lbl="Annulla" onclick="ovClose()"></button>
      <button class="b on" data-lbl="Salva" onclick="ovSave()"></button>
    </div>
  </div></div>

<script>
/* ===== ICONE SVG (currentColor) ===== */
const ICON={
  pin:'<path d="M12 22c4-5 7-8.4 7-12A7 7 0 1 0 5 10c0 3.6 3 7 7 12z"/><circle cx="12" cy="10" r="2.6"/>',
  info:'<circle cx="12" cy="12" r="9"/><path d="M12 11v5.5"/><circle cx="12" cy="7.7" r="1.1"/>',
  star:'<path d="M12 3.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L12 17l-5.2 2.6 1-5.8L3.5 9.7l5.9-.9z"/>',
  gift:'<rect x="4" y="10" width="16" height="10" rx="1.5"/><path d="M3 10h18M12 10v10"/><path d="M12 10c-1-3.6-5-3.6-5-1S9.5 10 12 10zm0 0c1-3.6 5-3.6 5-1S14.5 10 12 10z"/>',
  cup:'<path d="M6 8h11v4.5a5 5 0 0 1-5 5h-1a5 5 0 0 1-5-5z"/><path d="M17 9h1.8a2.2 2.2 0 0 1 0 4.4H17"/><path d="M7 21h9"/>',
  bag:'<path d="M6.5 8h11l-1 12h-9z"/><path d="M9 8a3 3 0 0 1 6 0"/>',
  cash:'<rect x="3" y="6" width="18" height="12" rx="1.5"/><circle cx="12" cy="12" r="3"/><path d="M6.5 9v6M17.5 9v6"/>',
  ticket:'<rect x="3" y="7" width="18" height="10" rx="2"/><path d="M9 7v10"/>',
  door:'<rect x="6" y="3" width="12" height="18" rx="1"/><circle cx="14.5" cy="12" r="1"/>',
  elevator:'<rect x="5" y="3" width="14" height="18" rx="1.5"/><path d="M9 10l1.5-2 1.5 2M13 14l1.5 2 1.5-2"/>',
  calendar:'<rect x="4" y="5" width="16" height="15" rx="1.5"/><path d="M4 9.5h16M8 3v4M16 3v4"/>',
  game:'<rect x="4" y="4" width="16" height="16" rx="3"/><circle cx="9" cy="9" r="1.1"/><circle cx="15" cy="9" r="1.1"/><circle cx="9" cy="15" r="1.1"/><circle cx="15" cy="15" r="1.1"/><circle cx="12" cy="12" r="1.1"/>',
  food:'<path d="M6 3v6a2 2 0 0 0 4 0V3M8 3v18"/><path d="M16 3c-1.6.7-2.2 3-2.2 5.2 0 1.8.7 2.8 2.2 3.2V21"/>',
  wc:'<circle cx="8" cy="4.5" r="1.7"/><path d="M6 21l1.2-7H6l1-4.2A1.4 1.4 0 0 1 9.4 9.8L10.4 14H9l1 7"/><circle cx="16" cy="4.5" r="1.7"/><path d="M14 21l1.4-6h1.2L18 21M16 8.8l-2 5h4z"/>',
  exit:'<path d="M13 4H6a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h7"/><path d="M10 12h10M16 8l4 4-4 4"/>',
  stairs:'<path d="M4 20h4v-4h4v-4h4v-4h4"/>',

/* ===== ROUTING (Dijkstra) ===== */
function nearestNode(p){ let b=null,bd=1e9; S.nodes.forEach(n=>{const d=Math.hypot(n.x-p.x,n.y-p.y); if(d<bd){bd=d;b=n;}}); return b; }
function adj(){ const a={}; S.nodes.forEach(n=>a[n.id]=[]); S.edges.forEach(e=>{const x=e[0],y=e[1],st=e[2]==='s'; const A=S.nodes.find(n=>n.id===x),B=S.nodes.find(n=>n.id===y);
  if(A&&B){let w=Math.hypot(A.x-B.x,A.y-B.y); if(accessible&&st)w*=60; a[x].push([y,w]); a[y].push([x,w]);}}); return a; }
function dijkstra(from,to){ const a=adj(),dist={},prev={},Q=new Set(S.nodes.map(n=>n.id));
  S.nodes.forEach(n=>dist[n.id]=1e9); if(dist[from]==null)return null; dist[from]=0;
  while(Q.size){ let u=null,ud=1e9; Q.forEach(id=>{if(dist[id]<ud){ud=dist[id];u=id;}}); if(u==null)break; Q.delete(u); if(u===to)break;
    (a[u]||[]).forEach(([v,w])=>{if(dist[u]+w<dist[v]){dist[v]=dist[u]+w;prev[v]=u;}}); }
  if(dist[to]>=1e9)return null; const path=[]; let c=to; while(c!=null){path.unshift(c); if(c===from)break; c=prev[c];}
  return path[0]===from?path:null; }
function buildRoute(from,to){ if(S.nodes.length>=2&&S.edges.length){ const n1=nearestNode(from),n2=nearestNode(to);
  if(n1&&n2){ const ids=dijkstra(n1.id,n2.id); if(ids) return [from,...ids.map(id=>{const n=S.nodes.find(x=>x.id===id);return{x:n.x,y:n.y};}),to]; } }
  return [from,to]; }

/* ===== PERCORSO + frecce + distanza/tempo + scheda ===== */
const routeEl=document.getElementById('route'),flowEl=document.getElementById('routeFlow'),hintG=document.getElementById('gRouteHint'),arrowG=document.getElementById('gArrows'),dot=document.getElementById('dot');
let anim=null; const dPath=p=>'M'+p.map(q=>q.x+' '+q.y).join(' L');
function lung(p){let l=0;for(let i=1;i<p.length;i++)l+=Math.hypot(p[i].x-p[i-1].x,p[i].y-p[i-1].y);return l;}
function puntoA(p,t){const tot=lung(p);let tg=t*tot,acc=0;for(let i=1;i<p.length;i++){const s=Math.hypot(p[i].x-p[i-1].x,p[i].y-p[i-1].y);if(acc+s>=tg){const k=s?(tg-acc)/s:0;return{x:p[i-1].x+(p[i].x-p[i-1].x)*k,y:p[i-1].y+(p[i].y-p[i-1].y)*k};}acc+=s;}return p[p.length-1];}
function angleA(p,t){const a=puntoA(p,Math.max(0,t-0.01)),b=puntoA(p,Math.min(1,t+0.01));return Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI;}
function clearRoute(){routeEl.setAttribute('d','');flowEl.setAttribute('d','');hintG.innerHTML='';arrowG.innerHTML='';dot.classList.add('hidden');if(anim)cancelAnimationFrame(anim);
  document.getElementById('card').classList.remove('on');hideBanner();activeDest=null; }
/* ===== Percorso tra piani diversi (via ascensore/scala) ===== */
function floorElevator(fi, pt){ const fl=S._floors[fi]; if(!fl||!fl.dests)return null;
  const ev=fl.dests.filter(d=>d.ic==='elevator'||d.ic==='stairs'); if(!ev.length)return null;
  if(!pt)return ev[0]; let b=ev[0],bd=1e9; ev.forEach(e=>{const dd=Math.hypot(e.x-pt.x,e.y-pt.y);if(dd<bd){bd=dd;b=e;}}); return b; }
function otherFloorMatches(){ if(!S._floors||S._floors.length<2)return []; const q=query.toLowerCase(); const res=[];
  S._floors.forEach((fl,fi)=>{ if(fi===S._fi)return; (fl.dests||[]).forEach(d=>{ if((!filterCat||catOf(d.ic)===filterCat)&&(!q||d.name.toLowerCase().includes(q)||displayName(d).toLowerCase().includes(q))) res.push({d,fi,fname:fl.name||('Piano '+(fi+1))}); }); }); return res; }
function goCross(targetFi, destId){
  if(targetFi===S._fi){ const d=S.dests.find(x=>x.id===destId); if(d)showRoute(d); return; }
  const evHere=floorElevator(S._fi, S.here); const targetName=(S._floors[targetFi].name)||('Piano '+(targetFi+1));
  if(evHere) showRoute(evHere);
  showBanner(svgIco('elevator',18)+'<span>'+cf('up')+' '+esc(targetName)+'</span>', cf('cont')+' →', ()=>{
    S._floors[S._fi]=snap(); applyFloor(targetFi); render(); floorAppear();
    const evT=floorElevator(targetFi,null), d=S.dests.find(x=>x.id===destId);
    if(d) showRoute(d, evT?{x:evT.x,y:evT.y}:null);
    showBanner(svgIco('elevator',18)+'<span>'+esc(targetName)+'</span>','',null);   // conferma: sei al piano X
  });
}
function showBanner(html, btnText, fn){ const b=document.getElementById('banner'); if(!b)return;
  b.innerHTML=html+(btnText?' <button id="bannerBtn">'+btnText+'</button>':''); b.classList.add('on');
  const bb=document.getElementById('bannerBtn'); if(bb&&fn) bb.onclick=fn; }
function hideBanner(){ const b=document.getElementById('banner'); if(b){b.classList.remove('on'); b.innerHTML='';} }
function showRoute(d, fromPt){ hideBanner(); const from=fromPt||S.here; if(!from){alert('Imposta prima "Tu sei qui".');return;}
  activeDest=d.id; renderDests(); renderDestBtns();
  const pts=buildRoute(from,{x:d.x,y:d.y});
  hintG.innerHTML='<path class="corrHint" d="'+dPath(pts)+'"/>';
  const dd=dPath(pts); routeEl.setAttribute('d',dd); flowEl.setAttribute('d',dd);
  const len=routeEl.getTotalLength(); routeEl.style.transition='none'; routeEl.style.strokeDasharray=len; routeEl.style.strokeDashoffset=len;
  routeEl.getBoundingClientRect(); routeEl.style.transition='stroke-dashoffset 1.1s ease'; routeEl.style.strokeDashoffset=0;
  // frecce direzionali (chevron) lungo il percorso
  const L=lung(pts), step=Math.max(70, L/9); let ar='';
  for(let dlen=step*0.6; dlen<L-20; dlen+=step){ const t=dlen/L; const q=puntoA(pts,t); const ang=angleA(pts,t);
    ar+='<g transform="translate('+q.x+','+q.y+') rotate('+ang.toFixed(0)+')"><path class="chev" d="M-6 -5 L1 0 L-6 5"/></g>'; }
  arrowG.innerHTML=ar;
  dot.classList.remove('hidden'); if(anim)cancelAnimationFrame(anim); let start=null; const dur=Math.max(1400, L*1.1);   // velocità naturale
  (function step2(ts){ if(!start)start=ts; const tt=((ts-start)%dur)/dur; const q=puntoA(pts,tt); dot.setAttribute('cx',q.x); dot.setAttribute('cy',q.y); anim=requestAnimationFrame(step2); })(performance.now());   // LOOP: ripete il percorso all'infinito
  // distanza/tempo + scheda
  const meters=Math.round(L*M_PER_UNIT), mins=Math.max(1,Math.ceil(meters/SPEED/60));
  showCard(d, meters, mins);
  resetIdle();
}
function showCard(d,meters,mins){ const c=document.getElementById('card');
  document.getElementById('cardIc').innerHTML='<svg viewBox="0 0 24 24">'+(ICON[d.ic]||ICON.pin)+'</svg>';
  document.getElementById('cardName').textContent=displayName(d);
  document.getElementById('cardSub').textContent=(tr().sub[catOf(d.ic)]||'');
  document.getElementById('cardDist').innerHTML=svgIco('walk',14)+'<span>~'+meters+' m · ~'+mins+' '+tr().min+'</span>';
  c.classList.add('on'); }

/* ===== INTERAZIONI ===== */
function onPin(d){ if(!d)return; resetIdle(); if(mode==='guest'){ showRoute(d); }
  else if(tool==='del'){ S.dests=S.dests.filter(x=>x.id!==d.id); save(); render(); } else { openDest(d); } }
function onNode(id){ const n=S.nodes.find(x=>x.id===id); if(!n)return;
  if(tool==='del'){ S.nodes=S.nodes.filter(x=>x.id!==id); S.edges=S.edges.filter(([a,b])=>a!==id&&b!==id); linkFrom=null; save(); render(); return; }
  if(tool==='link'){ if(linkFrom==null){linkFrom=id;renderNodes();}
    else if(linkFrom===id){linkFrom=null;renderNodes();}
    else{ const ex=S.edges.findIndex(([a,b])=>(a===linkFrom&&b===id)||(a===id&&b===linkFrom)); if(ex>=0)S.edges.splice(ex,1); else S.edges.push([linkFrom,id]); linkFrom=null; save(); render(); } } }
svg.addEventListener('click',ev=>{ if(mode!=='admin')return; if(_panned)return; const p=svgXY(ev);
  if(tool==='node'){ S.nodes.push({id:nid(),x:p.x,y:p.y}); save(); render(); }
  else if(tool==='dest'){ openDest(null,p); }
  else if(tool==='here'){ S.here={x:p.x,y:p.y}; save(); render(); } });
function autoLink(){ const R=320; S.edges=[]; S.nodes.forEach(a=>{ const near=S.nodes.filter(b=>b.id!==a.id).map(b=>({b,d:Math.hypot(a.x-b.x,a.y-b.y)})).filter(o=>o.d<=R).sort((x,y)=>x.d-y.d).slice(0,2);
  near.forEach(({b})=>{ if(!S.edges.some(([x,y])=>(x===a.id&&y===b.id)||(x===b.id&&y===a.id))) S.edges.push([a.id,b.id]); }); }); save(); render(); }

function onSearch(){ query=document.getElementById('ask').value; renderDests(); renderDestBtns(); resetIdle(); }
function askGo(){ const vis=visibleDests(); if(vis.length){ onPin(vis[0]); } }
function micToggle(){ const SR=window.SpeechRecognition||window.webkitSpeechRecognition; const b=document.getElementById('mic');
  if(!SR){ alert('Voce non disponibile su questo browser. Usa la ricerca scritta.'); return; }
  if(rec){ rec.stop(); rec=null; b.classList.remove('rec'); return; }
  rec=new SR(); rec.lang={it:'it-IT',en:'en-US',de:'de-DE',fr:'fr-FR'}[uiLang]; rec.interimResults=false; rec.maxAlternatives=1;
  rec.onresult=e=>{ const txt=e.results[0][0].transcript; document.getElementById('ask').value=txt; query=txt; renderDests(); renderDestBtns(); askGo(); };
  rec.onend=()=>{ b.classList.remove('rec'); rec=null; }; b.classList.add('rec'); rec.start(); }

  document.querySelectorAll('#ovCats button').forEach(b=>b.onclick=()=>{ ovCat=+b.getAttribute('data-c'); document.querySelectorAll('#ovCats button').forEach(x=>x.classList.toggle('on',x===b)); renderIcoGrid(); });

  }catch(err){ hideBanner(); alert('Lettura non riuscita (serve connessione): '+(err.message||err)); }
}

/* ===== EDITOR PLANIMETRIE (muri/stanze/porte/corridoi) ===== */
function $id(i){ return document.getElementById(i); }
function snapG(v){ return Math.round(v/10)*10; }
function constrain(sx,sy,ex,ey){ const dx=ex-sx,dy=ey-sy,adx=Math.abs(dx),ady=Math.abs(dy); if(adx>ady*2.5)return{x:ex,y:sy}; if(ady>adx*2.5)return{x:sx,y:ey}; const m=(adx+ady)/2; return {x:sx+Math.sign(dx)*m,y:sy+Math.sign(dy)*m}; }
function nodeAt(x,y){ let n=S.nodes.find(nd=>Math.hypot(nd.x-x,nd.y-y)<=35); if(!n){ n={id:nid(),x,y}; S.nodes.push(n);} return n; }
function nearWallEnd(x,y){ let best=null,bd=18; (S.walls||[]).forEach(w=>{[[w.x1,w.y1],[w.x2,w.y2]].forEach(p=>{const dd=Math.hypot(p[0]-x,p[1]-y); if(dd<bd){bd=dd;best={x:p[0],y:p[1]};}});}); return best; }
function projectOnWall(p){ let best=null,bd=28; (S.walls||[]).forEach(w=>{ const dx=w.x2-w.x1,dy=w.y2-w.y1,l2=dx*dx+dy*dy; if(!l2)return; let t=((p.x-w.x1)*dx+(p.y-w.y1)*dy)/l2; t=Math.max(0,Math.min(1,t)); const px=w.x1+t*dx,py=w.y1+t*dy,dd=Math.hypot(px-p.x,py-p.y); if(dd<bd){bd=dd;best={x:Math.round(px),y:Math.round(py),a:Math.atan2(dy,dx)*180/Math.PI};} }); return best; }
function showDim(x,y,txt){ const t=$id('dimPrev'); if(!t)return; t.setAttribute('x',x);t.setAttribute('y',y);t.setAttribute('text-anchor','middle');t.textContent=txt;t.style.display=''; }
function hideDim(){ const t=$id('dimPrev'); if(t)t.style.display='none'; }
let _draw=null;
svg.addEventListener('pointerdown', e=>{ if(mode!=='admin')return; const t=tool, p=svgXY(e);
  if(t==='door'){ const d=projectOnWall(p); if(d){ S.doors=S.doors||[]; S.doors.push({id:nid(),x:d.x,y:d.y,a:d.a}); save(); render(); } else alert('Avvicina la porta a un muro.'); return; }
  if(t==='zone'||t==='wall'||t==='corr'){ if((t==='zone'||t==='wall')&&S.img){ alert('Stanze e muri si disegnano sulla mappa SENZA immagine importata.'); return; } _draw={t,sx:snapG(p.x),sy:snapG(p.y),ex:snapG(p.x),ey:snapG(p.y)}; e.preventDefault(); } });
window.addEventListener('pointermove', e=>{ if(!_draw)return; const p=svgXY(e); let ex=snapG(p.x),ey=snapG(p.y);
  if(_draw.t==='zone'){ const x=Math.min(_draw.sx,ex),y=Math.min(_draw.sy,ey),w=Math.abs(ex-_draw.sx),h=Math.abs(ey-_draw.sy); const pv=$id('zonePrev'); pv.setAttribute('x',x);pv.setAttribute('y',y);pv.setAttribute('width',w);pv.setAttribute('height',h);pv.style.display=''; _draw.ex=ex;_draw.ey=ey; showDim(x+w/2,y-6,(Math.round(w*M_PER_UNIT*10)/10)+'×'+(Math.round(h*M_PER_UNIT*10)/10)+' m'); }
  else { let c={x:ex,y:ey}; if(_draw.t==='wall'){ const sn=nearWallEnd(ex,ey); if(sn&&!(sn.x===_draw.sx&&sn.y===_draw.sy)) c=sn; } if(e.shiftKey) c=constrain(_draw.sx,_draw.sy,c.x,c.y); const pv=$id('linePrev'); pv.setAttribute('x1',_draw.sx);pv.setAttribute('y1',_draw.sy);pv.setAttribute('x2',c.x);pv.setAttribute('y2',c.y); pv.setAttribute('class',_draw.t==='wall'?'wall':'edge'); pv.style.display=''; _draw.ex=c.x;_draw.ey=c.y; showDim((_draw.sx+c.x)/2,(_draw.sy+c.y)/2-6,(Math.round(Math.hypot(c.x-_draw.sx,c.y-_draw.sy)*M_PER_UNIT*10)/10)+' m'); } });
window.addEventListener('pointerup', ()=>{ if(!_draw)return; const d=_draw; _draw=null; $id('zonePrev').style.display='none'; $id('linePrev').style.display='none'; hideDim();
  if(d.t==='zone'){ const x=Math.min(d.sx,d.ex),y=Math.min(d.sy,d.ey),w=Math.abs(d.ex-d.sx),h=Math.abs(d.ey-d.sy); if(w>25&&h>25){ const name=prompt('Nome stanza (es. Sala B):',''); S.zones=S.zones||[]; S.zones.push({id:nid(),x,y,w,h,name:(name||'').trim()}); save(); render(); } }
  else if(d.t==='wall'){ if(Math.hypot(d.ex-d.sx,d.ey-d.sy)>15){ S.walls=S.walls||[]; S.walls.push({id:nid(),x1:d.sx,y1:d.sy,x2:d.ex,y2:d.ey}); save(); render(); } }
  else if(d.t==='corr'){ if(Math.hypot(d.ex-d.sx,d.ey-d.sy)>15){ const a=nodeAt(d.sx,d.sy),b=nodeAt(d.ex,d.ey); if(a.id!==b.id && !S.edges.some(([x,y])=>(x===a.id&&y===b.id)||(x===b.id&&y===a.id))) S.edges.push([a.id,b.id]); save(); render(); } } });

const EXPORT_CSS='.zone{fill:#221d2e;stroke:#5a5470;stroke-width:1.5}.zoneLbl{fill:#9a8fb5;font:600 14px sans-serif;text-anchor:middle}.wall{stroke:#6b6480;stroke-width:9;stroke-linecap:round}.doorGap{stroke:#0e0b16;stroke-width:12}.door{stroke:#e8d5a3;stroke-width:2.5;fill:none}.route{stroke:#e8d5a3;stroke-width:6;fill:none}.route-flow{display:none}.pinBody{fill:#e8d5a3;stroke:#1a1622}.pinIcon{stroke:#1a1622;stroke-width:2.3;fill:none}.pinTxt{fill:#fff;font:600 12.5px sans-serif;text-anchor:middle}.here{fill:#3ad07a;stroke:#fff}.here-ring{display:none}.here-tag{fill:#fff;font:700 11.5px sans-serif;text-anchor:middle}.chev{stroke:#fff;stroke-width:2.4;fill:none}.dot{display:none}';
async function exportMap(){

  const vp=clone.querySelector('#viewport'); if(vp) vp.removeAttribute('transform');
  const st=document.createElementNS(NS,'style'); st.textContent=EXPORT_CSS; clone.insertBefore(st, clone.firstChild);
  const xml=new XMLSerializer().serializeToString(clone);
  const im=new Image();
  im.onload=async()=>{ const c=document.createElement('canvas'); c.width=W; c.height=H; const ctx=c.getContext('2d'); ctx.fillStyle='#0e0b16'; ctx.fillRect(0,0,W,H); ctx.drawImage(im,0,0,W,H); const png=c.toDataURL('image/png');
    try{ await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'); const J=(window.jspdf&&window.jspdf.jsPDF); if(!J)throw 0; const pdf=new J({orientation:W>=H?'l':'p',unit:'px',format:[W,H]}); pdf.addImage(png,'PNG',0,0,W,H); pdf.save((S.company||'mappa')+'.pdf'); }
    catch(_){ const a=document.createElement('a'); a.href=png; a.download=(S.company||'mappa')+'.png'; a.click(); } };
  im.onerror=()=>alert('Esportazione non riuscita (riprova).');
  im.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(xml);
}
